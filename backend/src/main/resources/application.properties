# Server settings
server.port=8080
server.servlet.context-path=

# MySQL Connection Configuration
# (Change the username and password below to match your local MySQL configuration)
spring.datasource.url=jdbc:mysql://localhost:3306/graceconnect?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Tuffy@2003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Security & JWT Configuration
# Note: Keep jwt.secret long and secure (at least 256-bit base64/plain string).
graceconnect.jwt.secret=9a4f2c8d3e7b1a5f6c8d9e0a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c
# 1 Day in milliseconds: 86400000
graceconnect.jwt.expirationMs=86400000

# File Upload limits (just in case)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Swagger UI and API Docs configs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
